<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="310" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" text-anchor="middle" dominant-baseline="middle">GPU Optimization</text>

  <!-- GPU die outline -->
  <g transform="translate(600, 280)">
    <rect x="-120" y="-100" width="240" height="200" rx="12" fill="none" stroke="#00d2ff" stroke-width="2" opacity="0.5"/>
    <rect x="-120" y="-100" width="240" height="200" rx="12" fill="#00d2ff" fill-opacity="0.02"/>

    <!-- Core grid (SM units) -->
    <g fill="none" stroke="#6bcf7f" stroke-width="0.8" opacity="0.3">
      <rect x="-105" y="-85" width="80" height="80" rx="3"/>
      <rect x="-15" y="-85" width="80" height="80" rx="3"/>
      <rect x="75" y="-85" width="40" height="80" rx="3" fill="#ff6b6b" fill-opacity="0.05" stroke="#ff6b6b"/>

      <rect x="-105" y="5" width="80" height="80" rx="3"/>
      <rect x="-15" y="5" width="80" height="80" rx="3"/>
      <rect x="75" y="5" width="40" height="80" rx="3"/>
    </g>

    <!-- Cores inside each SM -->
    <g fill="#6bcf7f" opacity="0.15">
      <rect x="-95" y="-75" width="15" height="15" rx="2"/>
      <rect x="-75" y="-75" width="15" height="15" rx="2"/>
      <rect x="-55" y="-75" width="15" height="15" rx="2"/>
      <rect x="-35" y="-75" width="15" height="15" rx="2"/>

      <rect x="-95" y="-55" width="15" height="15" rx="2"/>
      <rect x="-75" y="-55" width="15" height="15" rx="2"/>
      <rect x="-55" y="-55" width="15" height="15" rx="2"/>
      <rect x="-35" y="-55" width="15" height="15" rx="2"/>

      <rect x="-95" y="-35" width="15" height="15" rx="2"/>
      <rect x="-75" y="-35" width="15" height="15" rx="2"/>
      <rect x="-55" y="-35" width="15" height="15" rx="2"/>
      <rect x="-35" y="-35" width="15" height="15" rx="2"/>

      <rect x="-5" y="-75" width="15" height="15" rx="2"/>
      <rect x="15" y="-75" width="15" height="15" rx="2"/>
      <rect x="35" y="-75" width="15" height="15" rx="2"/>
      <rect x="55" y="-75" width="15" height="15" rx="2"/>

      <rect x="-5" y="-55" width="15" height="15" rx="2"/>
      <rect x="15" y="-55" width="15" height="15" rx="2"/>
      <rect x="35" y="-55" width="15" height="15" rx="2"/>
      <rect x="55" y="-55" width="15" height="15" rx="2"/>
    </g>

    <!-- HBM memory (left and right) -->
    <rect x="-130" y="-30" width="15" height="60" rx="4" fill="#ffd93d" fill-opacity="0.1" stroke="#ffd93d" stroke-width="1" opacity="0.4"/>
    <text x="-122" y="8" fill="#ffd93d" font-family="monospace" font-size="6" text-anchor="middle" opacity="0.5" transform="rotate(-90,-122,8)">HBM</text>

    <rect x="115" y="-30" width="15" height="60" rx="4" fill="#ffd93d" fill-opacity="0.1" stroke="#ffd93d" stroke-width="1" opacity="0.4"/>
    <text x="122" y="8" fill="#ffd93d" font-family="monospace" font-size="6" text-anchor="middle" opacity="0.5" transform="rotate(90,122,8)">HBM</text>

    <!-- Heat zone indicator (rightmost block glowing) -->
    <g opacity="0.15">
      <rect x="75" y="-85" width="40" height="80" rx="3" fill="#ff6b6b"/>
    </g>
    <text x="95" y="-93" fill="#ff6b6b" font-family="monospace" font-size="7" text-anchor="middle" opacity="0.5">HOT</text>

    <!-- Cooling zones -->
    <rect x="-105" y="85" width="80" height="10" rx="2" fill="#00d2ff" fill-opacity="0.1" stroke="#00d2ff" stroke-width="0.5" opacity="0.3"/>
    <rect x="-15" y="85" width="80" height="10" rx="2" fill="#00d2ff" fill-opacity="0.1" stroke="#00d2ff" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="93" fill="#00d2ff" font-family="monospace" font-size="7" text-anchor="middle" opacity="0.4">COOLING</text>
  </g>

  <text x="600" y="500" fill="#9aa0a6" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" opacity="0.5">CUDA graphs · Kernel fusion · Memory optimization · Parallelism</text>

  <text x="1170" y="600" fill="#9aa0a6" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="end" opacity="0.7">ml-ke.github.io</text>
</svg>
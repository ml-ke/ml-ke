<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#00d2ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="70" x2="1200" y2="70"/><line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/><line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="350" x2="1200" y2="350"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="490" x2="1200" y2="490"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>
  
  <g filter="url(#glow)">
    <!-- Input layer -->
    <circle cx="300" cy="200" r="8" fill="#a78bfa" opacity="0.7"/>
    <circle cx="300" cy="280" r="8" fill="#a78bfa" opacity="0.7"/>
    <circle cx="300" cy="360" r="8" fill="#a78bfa" opacity="0.7"/>
    <circle cx="300" cy="440" r="8" fill="#a78bfa" opacity="0.7"/>
    <!-- Hidden layer -->
    <circle cx="500" cy="180" r="8" fill="#00d2ff" opacity="0.7"/>
    <circle cx="500" cy="260" r="8" fill="#00d2ff" opacity="0.7"/>
    <circle cx="500" cy="340" r="8" fill="#00d2ff" opacity="0.7"/>
    <circle cx="500" cy="420" r="8" fill="#00d2ff" opacity="0.7"/>
    <circle cx="500" cy="500" r="8" fill="#00d2ff" opacity="0.7"/>
    <!-- Hidden layer 2 -->
    <circle cx="700" cy="200" r="8" fill="#6bcf7f" opacity="0.7"/>
    <circle cx="700" cy="280" r="8" fill="#6bcf7f" opacity="0.7"/>
    <circle cx="700" cy="360" r="8" fill="#6bcf7f" opacity="0.7"/>
    <circle cx="700" cy="440" r="8" fill="#6bcf7f" opacity="0.7"/>
    <!-- Output -->
    <circle cx="900" cy="260" r="10" fill="#a78bfa" opacity="0.8"/>
    <circle cx="900" cy="380" r="10" fill="#00d2ff" opacity="0.8"/>
  </g>
  <g stroke="#a78bfa" stroke-width="0.5" opacity="0.12">
    <line x1="308" y1="200" x2="492" y2="180"/>
    <line x1="308" y1="200" x2="492" y2="260"/>
    <line x1="308" y1="280" x2="492" y2="260"/>
    <line x1="308" y1="280" x2="492" y2="340"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="70" x2="1200" y2="70"/><line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/><line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="350" x2="1200" y2="350"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="490" x2="1200" y2="490"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>
  <!-- Ouroboros / self-evolving cycle -->
  <g filter="url(#glow)">
    <!-- Main circular cycle — represents skill evolution loop -->
    <circle cx="600" cy="340" r="140" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.3"/>
    <circle cx="600" cy="340" r="120" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.2" stroke-dasharray="8,6"/>
    
    <!-- Gear teeth around the circle to represent "system/mechanism" -->
    <g fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.4">
      <rect x="590" y="192" width="20" height="18" rx="3"/>
      <rect x="590" y="470" width="20" height="18" rx="3"/>
      <rect x="452" y="330" width="18" height="20" rx="3"/>
      <rect x="730" y="330" width="18" height="20" rx="3"/>
      <rect x="510" y="250" width="16" height="16" rx="3" transform="rotate(-45,518,258)"/>
      <rect x="670" y="250" width="16" height="16" rx="3" transform="rotate(45,678,258)"/>
      <rect x="510" y="414" width="16" height="16" rx="3" transform="rotate(45,518,422)"/>
      <rect x="670" y="414" width="16" height="16" rx="3" transform="rotate(-45,678,422)"/>
    </g>
    
    <!-- Self-referential feedback arrows inside the circle -->
    <path d="M 600 260 Q 660 310 640 370" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.7" marker-end="url(#arrow1)"/>
    <path d="M 560 420 Q 500 370 520 310" fill="none" stroke="#f472b6" stroke-width="2.5" opacity="0.7" marker-end="url(#arrow2)"/>
    <path d="M 640 300 Q 680 340 630 380" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.5"/>
    <path d="M 520 380 Q 480 340 530 300" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.5"/>
    
    <!-- Arrow markers -->
    <defs>
      <marker id="arrow1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
      </marker>
      <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#f472b6"/>
      </marker>
    </defs>
    
    <!-- Center node — the "self" -->
    <circle cx="600" cy="340" r="20" fill="#a78bfa" opacity="0.15"/>
    <circle cx="600" cy="340" r="10" fill="none" stroke="#f472b6" stroke-width="2" opacity="0.8"/>
    <text x="600" y="344" text-anchor="middle" font-family="monospace" font-size="10" fill="#f472b6" opacity="0.9">⥁</text>
    
    <!-- Skill modules around the cycle -->
    <rect x="575" y="210" width="50" height="22" rx="4" fill="#a78bfa" opacity="0.2" stroke="#a78bfa" stroke-width="1"/>
    <text x="600" y="224" text-anchor="middle" font-family="monospace" font-size="8" fill="#a78bfa" opacity="0.8">CODE</text>
    
    <rect x="680" y="270" width="50" height="22" rx="4" fill="#f472b6" opacity="0.2" stroke="#f472b6" stroke-width="1"/>
    <text x="705" y="284" text-anchor="middle" font-family="monospace" font-size="8" fill="#f472b6" opacity="0.8">EVAL</text>
    
    <rect x="680" y="390" width="50" height="22" rx="4" fill="#fb923c" opacity="0.2" stroke="#fb923c" stroke-width="1"/>
    <text x="705" y="404" text-anchor="middle" font-family="monospace" font-size="8" fill="#fb923c" opacity="0.8">FIX</text>
    
    <rect x="575" y="450" width="50" height="22" rx="4" fill="#a78bfa" opacity="0.2" stroke="#a78bfa" stroke-width="1"/>
    <text x="600" y="464" text-anchor="middle" font-family="monospace" font-size="8" fill="#a78bfa" opacity="0.8">LEARN</text>
    
    <rect x="475" y="390" width="50" height="22" rx="4" fill="#f472b6" opacity="0.2" stroke="#f472b6" stroke-width="1"/>
    <text x="500" y="404" text-anchor="middle" font-family="monospace" font-size="8" fill="#f472b6" opacity="0.8">TEST</text>
    
    <rect x="475" y="270" width="50" height="22" rx="4" fill="#fb923c" opacity="0.2" stroke="#fb923c" stroke-width="1"/>
    <text x="500" y="284" text-anchor="middle" font-family="monospace" font-size="8" fill="#fb923c" opacity="0.8">PLAN</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="125" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="700" fill="#e6edf3" letter-spacing="1">Self-Evolving Agent Skills:</text>
  <text x="600" y="167" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="700" fill="#e6edf3" letter-spacing="1">When AI Rewrites Its Playbook</text>
  <text x="600" y="530" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" fill="#8b949e" letter-spacing="3">AUTONOMOUS SKILL EVOLUTION · SECURITY AUDIT</text>
  <line x1="420" y1="545" x2="780" y2="545" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <text x="1090" y="600" text-anchor="end" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#484f58">ml-ke.github.io</text>
  <circle cx="1110" cy="607" r="3" fill="#a78bfa" opacity="0.6"/>
</svg>

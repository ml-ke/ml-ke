<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="310" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" text-anchor="middle" dominant-baseline="middle">Monitoring ML Systems</text>

  <!-- Dashboard panels -->

  <!-- Panel 1: Gauge -->
  <g transform="translate(200, 230)">
    <rect x="-90" y="-90" width="180" height="180" rx="10" fill="none" stroke="#9aa0a6" stroke-width="1" opacity="0.2"/>
    <!-- Gauge arc -->
    <path d="M -55 40 A 65 65 0 0 1 55 40" fill="none" stroke="#9aa0a6" stroke-width="8" opacity="0.08"/>
    <path d="M -55 40 A 65 65 0 0 1 0 -25" fill="none" stroke="#6bcf7f" stroke-width="8" opacity="0.4"/>
    <text x="0" y="10" fill="#6bcf7f" font-family="monospace" font-size="24" font-weight="700" text-anchor="middle">92%</text>
    <text x="0" y="30" fill="#9aa0a6" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.5">accuracy</text>
  </g>

  <!-- Panel 2: Drift arrows -->
  <g transform="translate(500, 230)">
    <rect x="-90" y="-90" width="180" height="180" rx="10" fill="none" stroke="#9aa0a6" stroke-width="1" opacity="0.2"/>
    <!-- Distribution curves -->
    <path d="M -60 40 Q -30 -20 0 20 Q 30 -10 60 40" fill="none" stroke="#00d2ff" stroke-width="2" opacity="0.4"/>
    <path d="M -60 50 Q -30 0 0 30 Q 30 5 60 50" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.3" stroke-dasharray="4,3"/>
    <!-- Drift arrow -->
    <line x1="-10" y1="-30" x2="20" y2="-30" stroke="#ffd93d" stroke-width="2" opacity="0.5"/>
    <polygon points="18,-35 25,-30 18,-25" fill="#ffd93d" opacity="0.5"/>
    <text x="5" y="-38" fill="#ffd93d" font-family="monospace" font-size="9" text-anchor="middle" opacity="0.5">drift</text>
    <text x="0" y="65" fill="#9aa0a6" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.5">data drift</text>
  </g>

  <!-- Panel 3: Alert signals -->
  <g transform="translate(800, 230)">
    <rect x="-90" y="-90" width="180" height="180" rx="10" fill="none" stroke="#9aa0a6" stroke-width="1" opacity="0.2"/>
    <!-- Alert bell -->
    <g transform="translate(0, -15)" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.5">
      <path d="M -20 15 Q -20 -10 0 -25 Q 20 -10 20 15 Z"/>
      <rect x="-8" y="15" width="16" height="4" rx="1"/>
      <circle cx="0" cy="22" r="3"/>
    </g>
    <!-- Alert lines -->
    <g stroke="#ff6b6b" stroke-width="2" opacity="0.3">
      <line x1="-30" y1="20" x2="30" y2="20"/>
      <line x1="-25" y1="30" x2="25" y2="30"/>
      <line x1="-15" y1="40" x2="15" y2="40"/>
    </g>
    <!-- Alert level indicator -->
    <text x="0" y="-40" fill="#ff6b6b" font-family="monospace" font-size="9" text-anchor="middle" opacity="0.5">🔴 CRITICAL</text>
    <text x="0" y="55" fill="#9aa0a6" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.5">alerts</text>
  </g>

  <!-- Bottom row: metrics -->
  <g transform="translate(350, 420)">
    <text x="0" y="0" fill="#a78bfa" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.5">latency: 245ms ⏱</text>
  </g>
  <g transform="translate(600, 420)">
    <text x="0" y="0" fill="#ffd93d" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.5">throughput: 1.2k req/s 📊</text>
  </g>
  <g transform="translate(850, 420)">
    <text x="0" y="0" fill="#00d2ff" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.5">error rate: 0.03% 📉</text>
  </g>

  <text x="600" y="510" fill="#9aa0a6" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" opacity="0.5">Real-time dashboards · Alerting · Model degradation detection</text>

  <text x="1170" y="600" fill="#9aa0a6" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="end" opacity="0.7">ml-ke.github.io</text>
</svg>
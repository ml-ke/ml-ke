<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="310" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" text-anchor="middle" dominant-baseline="middle">African AI Communities</text>

  <g fill="none" stroke="#9aa0a6" stroke-width="1" opacity="0.15">
    <line x1="200" y1="200" x2="500" y2="150"/>
    <line x1="500" y1="150" x2="800" y2="180"/>
    <line x1="200" y1="200" x2="350" y2="350"/>
    <line x1="500" y1="150" x2="350" y2="350"/>
    <line x1="800" y1="180" x2="680" y2="350"/>

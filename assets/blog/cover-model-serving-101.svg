<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <marker id="arrow-serv" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d2ff"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="310" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" text-anchor="middle" dominant-baseline="middle">Model Serving 101</text>

  <!-- Notebook (Jupyter-like) -->
  <g transform="translate(280, 260)">
    <rect x="-60" y="-60" width="120" height="120" rx="8" fill="none" stroke="#6bcf7f" stroke-width="2" opacity="0.5"/>
    <rect x="-50" y="-50" width="100" height="100" rx="4" fill="#6bcf7f" fill-opacity="0.03"/>
    <!-- Code lines -->
    <line x1="-40" y1="-35" x2="20" y2="-35" stroke="#6bcf7f" stroke-width="3" opacity="0.3"/>
    <line x1="-40" y1="-20" x2="40" y2="-20" stroke="#6bcf7f" stroke-width="1.5" opacity="0.2"/>
    <line x1="-40" y1="-10" x2="30" y2="-10" stroke="#6bcf7f" stroke-width="1.5" opacity="0.2"/>
    <line x1="-40" y1="0" x2="35" y2="0" stroke="#6bcf7f" stroke-width="1.5" opacity="0.2"/>
    <line x1="-40" y1="10" x2="25" y2="10" stroke="#6bcf7f" stroke-width="1.5" opacity="0.2"/>
    <!-- Output cell -->
    <rect x="-40" y="25" width="80" height="20" rx="4" fill="#6bcf7f" fill-opacity="0.08" stroke="#6bcf7f" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="38" fill="#6bcf7f" font-family="monospace" font-size="7" text-anchor="middle" opacity="0.5">[✓] trained</text>
    <!-- Notebook label -->
    <text x="0" y="-65" fill="#6bcf7f" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.6">Notebook</text>
  </g>

  <!-- Transformation arrow -->
  <g fill="none" stroke="#00d2ff" stroke-width="2.5" opacity="0.6">
    <line x1="350" y1="320" x2="470" y2="320"/>
    <polygon points="465,315 475,320 465,325" fill="#00d2ff"/>
  </g>
  <text x="410" y="340" fill="#00d2ff" font-family="monospace" font-size="9" text-anchor="middle" opacity="0.5">export</text>

  <!-- Server rack (right) -->
  <g transform="translate(740, 260)">
    <rect x="-60" y="-60" width="120" height="120" rx="6" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
    <rect x="-50" y="-50" width="100" height="100" rx="4" fill="#a78bfa" fill-opacity="0.03"/>
    <!-- Server units -->
    <rect x="-40" y="-40" width="80" height="15" rx="2" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-width="0.8" opacity="0.4"/>
    <rect x="-40" y="-20" width="80" height="15" rx="2" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-width="0.8" opacity="0.4"/>
    <rect x="-40" y="0" width="80" height="15" rx="2" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-width="0.8" opacity="0.4"/>
    <rect x="-40" y="20" width="80" height="15" rx="2" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-width="0.8" opacity="0.4"/>
    <!-- Status lights -->
    <circle cx="-30" cy="-33" r="2" fill="#6bcf7f" opacity="0.6"/>
    <circle cx="-30" cy="-13" r="2" fill="#6bcf7f" opacity="0.6"/>
    <circle cx="-30" cy="7" r="2" fill="#6bcf7f" opacity="0.6"/>
    <circle cx="-30" cy="27" r="2" fill="#6bcf7f" opacity="0.6"/>
    <text x="0" y="-65" fill="#a78bfa" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.6">Server</text>
  </g>

  <!-- API arrows flowing from server -->
  <g fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.3">
    <path d="M 810 230 Q 880 210 920 230" marker-end="url(#arrow-serv)"/>
    <path d="M 810 260 Q 880 260 920 260" marker-end="url(#arrow-serv)"/>
    <path d="M 810 290 Q 880 310 920 290" marker-end="url(#arrow-serv)"/>
  </g>
  <text x="920" y="260" fill="#00d2ff" font-family="monospace" font-size="9" text-anchor="start" opacity="0.4">API</text>

  <text x="600" y="490" fill="#9aa0a6" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" opacity="0.5">From Jupyter notebook to production API endpoint</text>

  <text x="1170" y="600" fill="#9aa0a6" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="end" opacity="0.7">ml-ke.github.io</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="310" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" text-anchor="middle" dominant-baseline="middle">Constrained Environment AI</text>

  <!-- Edge device box -->
  <rect x="400" y="220" width="400" height="160" rx="12" fill="none" stroke="#ffd93d" stroke-width="2" opacity="0.6"/>
  <rect x="400" y="220" width="400" height="160" rx="12" fill="#ffd93d" fill-opacity="0.03"/>

  <!-- Device label -->
  <text x="600" y="245" fill="#ffd93d" font-family="monospace" font-size="11" text-anchor="middle" opacity="0.6">EDGE DEVICE</text>

  <!-- Minimal data flow arrows (small, constrained) -->
  <g fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.4">
    <line x1="320" y1="250" x2="390" y2="270"/>
    <line x1="320" y1="280" x2="390" y2="290"/>
    <line x1="320" y1="310" x2="390" y2="310"/>
    <polygon points="385,270 395,270 390,265" fill="#00d2ff"/>
    <polygon points="385,290 395,290 390,285" fill="#00d2ff"/>
    <polygon points="385,310 395,310 390,305" fill="#00d2ff"/>
  </g>
  <text x="300" y="285" fill="#00d2ff" font-family="monospace" font-size="9" text-anchor="end" opacity="0.4">limited data</text>

  <!-- Output stream -->
  <g fill="none" stroke="#6bcf7f" stroke-width="1.5" opacity="0.4">
    <line x1="800" y1="290" x2="870" y2="290"/>
    <polygon points="865,290 875,290 870,285" fill="#6bcf7f"/>
  </g>

  <!-- Offline symbol -->
  <g transform="translate(600, 320)" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.5">
    <circle cx="0" cy="0" r="18"/>
    <line x1="-12" y1="-12" x2="12" y2="12"/>
  </g>
  <text x="600" y="355" fill="#ff6b6b" font-family="monospace" font-size="9" text-anchor="middle" opacity="0.5">offline-capable</text>

  <!-- Battery icon -->
  <g transform="translate(720, 240)" fill="none" stroke="#6bcf7f" stroke-width="1.5" opacity="0.5">
    <rect x="-12" y="-8" width="24" height="16" rx="3"/>
    <rect x="12" y="-4" width="4" height="8" rx="1"/>
    <rect x="-8" y="-4" width="12" height="8" rx="1" fill="#6bcf7f" fill-opacity="0.3"/>
  </g>
  <!-- Tiny ML chip inside device -->
  <g transform="translate(600, 280)">
    <rect x="-12" y="-6" width="24" height="12" rx="2" fill="none" stroke="#00d2ff" stroke-width="1" opacity="0.4"/>
    <text x="0" y="2" fill="#00d2ff" font-family="monospace" font-size="6" text-anchor="middle" opacity="0.5">TinyML</text>
  </g>

  <text x="600" y="490" fill="#9aa0a6" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" opacity="0.5">Model quantization · On-device inference · Low-power operation</text>

  <text x="1170" y="600" fill="#9aa0a6" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="end" opacity="0.7">ml-ke.github.io</text>
</svg>
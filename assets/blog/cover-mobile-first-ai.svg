<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="310" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" text-anchor="middle" dominant-baseline="middle">AI for Mobile-First Markets</text>

  <!-- Phone outline -->
  <g transform="translate(600, 280)">
    <rect x="-55" y="-100" width="110" height="200" rx="16" fill="none" stroke="#00d2ff" stroke-width="2.5" opacity="0.7"/>
    <!-- Screen -->
    <rect x="-45" y="-85" width="90" height="160" rx="4" fill="#00d2ff" fill-opacity="0.03"/>
    <!-- Camera notch -->
    <rect x="-12" y="-92" width="24" height="6" rx="3" fill="#00d2ff" fill-opacity="0.15"/>
    <!-- Home button -->
    <circle cx="0" cy="90" r="6" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.3"/>

    <!-- ML Brain inside phone -->
    <g transform="translate(0, -10)">
      <path d="M -20 -15 Q 0 -25 20 -15 Q 30 -5 30 10 Q 30 25 25 30 Q 20 35 20 40 L 20 45 Q 10 42 0 42 Q -10 42 -20 45 L -20 40 Q -25 35 -30 30 Q -35 25 -35 10 Q -35 -5 -20 -15 Z"
            fill="none" stroke="#6bcf7f" stroke-width="1.5" opacity="0.6"/>
      <path d="M -15 -5 Q 0 -10 15 -5" fill="none" stroke="#6bcf7f" stroke-width="1.5" opacity="0.5"/>
      <path d="M -20 8 Q 0 3 20 8" fill="none" stroke="#6bcf7f" stroke-width="1.5" opacity="0.5"/>
      <path d="M -15 22 Q 0 17 15 22" fill="none" stroke="#6bcf7f" stroke-width="1.5" opacity="0.5"/>
      <!-- Nodes -->
      <circle cx="-12" cy="-5" r="2" fill="#6bcf7f" opacity="0.7"/>
      <circle cx="0" cy="-10" r="2" fill="#6bcf7f" opacity="0.7"/>
      <circle cx="12" cy="-5" r="2" fill="#6bcf7f" opacity="0.7"/>
      <circle cx="-15" cy="8" r="2" fill="#6bcf7f" opacity="0.7"/>
      <circle cx="0" cy="3" r="2" fill="#6bcf7f" opacity="0.7"/>
      <circle cx="15" cy="8" r="2" fill="#6bcf7f" opacity="0.7"/>
    </g>
  </g>

  <!-- Network waves radiating outward -->
  <g fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.2">
    <path d="M 470 200 Q 420 180 400 130"/>
    <path d="M 460 220 Q 380 210 350 160"/>
    <path d="M 730 200 Q 780 180 800 130"/>
    <path d="M 740 220 Q 820 210 850 160"/>
    <path d="M 500 370 Q 430 400 400 440"/>
    <path d="M 700 370 Q 770 400 800 440"/>
  </g>
  <!-- Wave arcs -->
  <g fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.15">
    <path d="M 450 160 A 200 200 0 0 1 750 160"/>
    <path d="M 400 140 A 280 280 0 0 1 800 140"/>
  </g>

  <text x="600" y="490" fill="#9aa0a6" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" opacity="0.5">On-device ML · Edge inference · Offline-capable models</text>

  <text x="1170" y="600" fill="#9aa0a6" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="end" opacity="0.7">ml-ke.github.io</text>
</svg>
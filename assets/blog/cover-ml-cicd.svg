<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <marker id="arrow-cicd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6bcf7f"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="310" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" text-anchor="middle" dominant-baseline="middle">ML CI/CD</text>

  <rect x="90" y="220" width="100" height="80" rx="10" fill="#ffd93d" fill-opacity="0.07" stroke="#ffd93d" stroke-width="1.5"/>
  <text x="140" y="255" fill="#ffd93d" font-family="system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Data</text>
  <text x="140" y="275" fill="#ffd93d" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.6">data pipeline</text>

  <rect x="270" y="220" width="100" height="80" rx="10" fill="#a78bfa" fill-opacity="0.07" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="320" y="255" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Train</text>
  <text x="320" y="275" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.6">model training</text>

  <rect x="450" y="220" width="100" height="80" rx="10" fill="#00d2ff" fill-opacity="0.07" stroke="#00d2ff" stroke-width="1.5"/>
  <text x="500" y="255" fill="#00d2ff" font-family="system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Eval</text>
  <text x="500" y="275" fill="#00d2ff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.6">evaluation</text>

  <rect x="630" y="220" width="100" height="80" rx="10" fill="#6bcf7f" fill-opacity="0.07" stroke="#6bcf7f" stroke-width="1.5"/>
  <text x="680" y="255" fill="#6bcf7f" font-family="system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Deploy</text>
  <text x="680" y="275" fill="#6bcf7f" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.6">production</text>

  <rect x="810" y="220" width="100" height="80" rx="10" fill="#ff6b6b" fill-opacity="0.07" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="860" y="255" fill="#ff6b6b" font-family="system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Monitor</text>
  <text x="860" y="275" fill="#ff6b6b" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.6">observability</text>

  <g fill="none" stroke="#6bcf7f" stroke-width="2.5" opacity="0.5">
    <line x1="245" y1="260" x2="300" y2="260" marker-end="url(#arrow-cicd)"/>
  </g>

  <g fill="none" stroke="#6bcf7f" stroke-width="2.5" opacity="0.5">
    <line x1="425" y1="260" x2="480" y2="260" marker-end="url(#arrow-cicd)"/>
  </g>

  <g fill="none" stroke="#6bcf7f" stroke-width="2.5" opacity="0.5">
    <line x1="605" y1="260" x2="660" y2="260" marker-end="url(#arrow-cicd)"/>
  </g>

  <g fill="none" stroke="#6bcf7f" stroke-width="2.5" opacity="0.5">
    <line x1="785" y1="260" x2="840" y2="260" marker-end="url(#arrow-cicd)"/>
  </g>

  <!-- Feedback loop arrow going bottom -->
  <g fill="none" stroke="#6bcf7f" stroke-width="2" opacity="0.3" stroke-dasharray="6,4">
    <path d="M 860 300 Q 860 420 600 420 Q 340 420 140 300"/>
  </g>
  <text x="600" y="440" fill="#6bcf7f" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.4">continuous feedback loop</text>

  <!-- Arrow on feedback loop -->
  <polygon points="145,300 140,300 155,310" fill="#6bcf7f" opacity="0.3"/>
  <polygon points="855,300 860,300 845,310" fill="#6bcf7f" opacity="0.3"/>

  <!-- Version tags -->
  <g fill="#9aa0a6" font-family="monospace" font-size="8" opacity="0.3">
    <text x="140" y="210" text-anchor="middle">v1.0</text>
    <text x="320" y="210" text-anchor="middle">v1.0</text>
    <text x="500" y="210" text-anchor="middle">v1.0</text>
  </g>

  <text x="600" y="510" fill="#9aa0a6" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" opacity="0.5">Data versioning · Model registry · Automated retraining</text>

  <text x="1170" y="600" fill="#9aa0a6" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="end" opacity="0.7">ml-ke.github.io</text>
</svg>
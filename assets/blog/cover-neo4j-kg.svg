<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6bcf7f"/>
      <stop offset="100%" style="stop-color:#00d2ff"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ffd93d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="70" x2="1200" y2="70"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="490" x2="1200" y2="490"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>
  <!-- Decorative nodes (graph visualization style) -->
  <g filter="url(#glow)">
    <!-- Central node cluster -->
    <circle cx="600" cy="315" r="70" fill="none" stroke="url(#accent1)" stroke-width="2" opacity="0.6"/>
    <circle cx="600" cy="315" r="15" fill="#6bcf7f" opacity="0.8"/>
    <!-- Connected nodes -->
    <circle cx="400" cy="220" r="10" fill="#00d2ff" opacity="0.7"/>
    <circle cx="800" cy="240" r="10" fill="#00d2ff" opacity="0.7"/>
    <circle cx="350" cy="400" r="10" fill="#ffd93d" opacity="0.7"/>
    <circle cx="750" cy="430" r="10" fill="#ffd93d" opacity="0.7"/>
    <circle cx="480" cy="160" r="8" fill="#6bcf7f" opacity="0.5"/>
    <circle cx="720" cy="170" r="8" fill="#6bcf7f" opacity="0.5"/>
    <circle cx="300" cy="300" r="8" fill="#ff6b6b" opacity="0.5"/>
    <circle cx="850" cy="320" r="8" fill="#ff6b6b" opacity="0.5"/>
    <circle cx="450" cy="480" r="8" fill="#00d2ff" opacity="0.5"/>
    <circle cx="700" cy="470" r="8" fill="#00d2ff" opacity="0.5"/>
    <!-- Small outer dots -->
    <circle cx="200" cy="150" r="4" fill="#6bcf7f" opacity="0.3"/>
    <circle cx="950" cy="180" r="4" fill="#6bcf7f" opacity="0.3"/>
    <circle cx="180" cy="450" r="4" fill="#ffd93d" opacity="0.3"/>
    <circle cx="1000" cy="480" r="4" fill="#ffd93d" opacity="0.3"/>
  </g>
  <!-- Edges connecting nodes -->
  <g stroke="#6bcf7f" stroke-width="1" opacity="0.15">
    <line x1="600" y1="315" x2="400" y2="220"/>
    <line x1="600" y1="315" x2="800" y2="240"/>
    <line x1="600" y1="315" x2="350" y2="400"/>
    <line x1="600" y1="315" x2="750" y2="430"/>
    <line x1="400" y1="220" x2="480" y2="160"/>
    <line x1="800" y1="240" x2="720" y2="170"/>
    <line x1="350" y1="400" x2="300" y2="300"/>
    <line x1="750" y1="430" x2="850" y2="320"/>
    <line x1="350" y1="400" x2="450" y2="480"/>
    <line x1="750" y1="430" x2="700" y2="470"/>
  </g>
  <!-- Title -->
  <text x="600" y="260" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#e6edf3" letter-spacing="1">Building a Knowledge Graph</text>
  <text x="600" y="305" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#e6edf3" letter-spacing="1">with Neo4j and Python</text>
  <!-- Subtitle -->
  <text x="600" y="355" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#8b949e" letter-spacing="2">KNOWLEDGE GRAPHS · HANDS-ON TUTORIAL</text>
  <!-- Decorative line -->
  <line x1="400" y1="380" x2="800" y2="380" stroke="url(#accent1)" stroke-width="2" opacity="0.5"/>
  <!-- Bottom-right branding -->
  <text x="1090" y="600" text-anchor="end" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#484f58">ml-ke.github.io</text>
  <!-- Small logo icon -->
  <circle cx="1120" cy="607" r="3" fill="#6bcf7f" opacity="0.6"/>
</svg>
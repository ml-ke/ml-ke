<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="310" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" text-anchor="middle" dominant-baseline="middle">The State of AI in Africa</text>

  <!-- African continent outline (simplified) -->
  <g transform="translate(600, 300)">
    <path d="M -10 -110 L 20 -105 L 40 -95 L 55 -80 L 65 -60 L 70 -40 L 75 -25 L 80 -10
             L 85 5 L 90 15 L 85 25 L 80 30 L 75 25 L 70 30 L 65 40 L 60 50
             L 55 60 L 45 70 L 35 75 L 25 70 L 15 65 L 5 70 L -5 75 L -15 70
             L -25 65 L -35 55 L -40 45 L -45 35 L -50 25 L -55 15 L -60 5
             L -65 -5 L -60 -15 L -55 -25 L -50 -35 L -45 -45 L -40 -55
             L -35 -65 L -30 -75 L -25 -85 L -20 -95 L -15 -105 Z"
          fill="#6bcf7f" fill-opacity="0.06" stroke="#6bcf7f" stroke-width="2"/>

    <!-- Tech nodes glowing inside the continent -->
    <circle cx="-20" cy="-20" r="4" fill="#00d2ff" opacity="0.8"/>
    <circle cx="10" cy="-10" r="3" fill="#00d2ff" opacity="0.6"/>
    <circle cx="30" cy="10" r="5" fill="#ffd93d" opacity="0.8"/>
    <circle cx="0" cy="25" r="3" fill="#00d2ff" opacity="0.5"/>
    <circle cx="-30" cy="10" r="4" fill="#a78bfa" opacity="0.7"/>
    <circle cx="40" cy="-30" r="3" fill="#ffd93d" opacity="0.6"/>
    <circle cx="-10" cy="-50" r="3" fill="#00d2ff" opacity="0.5"/>
    <circle cx="20" cy="35" r="3" fill="#a78bfa" opacity="0.5"/>

    <!-- Circuit traces between nodes -->
    <g fill="none" stroke="#00d2ff" stroke-width="1" opacity="0.3">
      <path d="M -20 -20 L 10 -10 L 30 10"/>
      <path d="M 10 -10 L 40 -30"/>
      <path d="M -20 -20 L -10 -50"/>
      <path d="M 30 10 L 20 35"/>
      <path d="M -20 -20 L -30 10 L 0 25"/>
      <path d="M 0 25 L 20 35"/>
    </g>
  </g>

  <text x="600" y="490" fill="#9aa0a6" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" opacity="0.5">Growing ecosystems · Local solutions · Global impact</text>

  <text x="1170" y="600" fill="#9aa0a6" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="end" opacity="0.7">ml-ke.github.io</text>
</svg>
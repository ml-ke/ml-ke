    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>
  
  <g filter="url(#glow)">
    <rect x="200" y="180" width="150" height="80" rx="8" fill="none" stroke="#ffd93d" stroke-width="2" opacity="0.4"/>
    <text x="275" y="222" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffd93d" opacity="0.6">AGENT</text>
    <rect x="450" y="140" width="130" height="60" rx="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.4"/>
    <text x="515" y="175" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff6b6b" opacity="0.6">TOOL A</text>
    <rect x="450" y="240" width="130" height="60" rx="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.4"/>
    <text x="515" y="275" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff6b6b" opacity="0.6">TOOL B</text>
    <rect x="450" y="340" width="130" height="60" rx="6" fill="none" stroke="#00d2ff" stroke-width="2" opacity="0.4"/>
    <text x="515" y="375" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d2ff" opacity="0.6">DATA</text>
    <!-- Red alert -->
    <circle cx="720" cy="280" r="20" fill="none" stroke="#ffd93d" stroke-width="2" opacity="0.6"/>
    <text x="720" y="285" text-anchor="middle" font-size="18" fill="#ffd93d" opacity="0.8">⚠</text>
  </g>
  <g stroke="#ffd93d" stroke-width="1" opacity="0.2">
    <line x1="350" y1="210" x2="450" y2="170"/>
    <line x1="350" y1="220" x2="450" y2="270"/>
    <line x1="350" y1="230" x2="450" y2="370"/>

    <line x1="0" y1="350" x2="1200" y2="350"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="490" x2="1200" y2="490"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>
  
  <g filter="url(#glow)">
    <!-- Graph half -->
    <circle cx="350" cy="280" r="12" fill="#ffd93d" opacity="0.8"/>
    <circle cx="250" cy="220" r="8" fill="#6bcf7f" opacity="0.6"/>
    <circle cx="430" cy="210" r="8" fill="#6bcf7f" opacity="0.6"/>
    <circle cx="280" cy="360" r="8" fill="#00d2ff" opacity="0.6"/>
    <circle cx="440" cy="350" r="8" fill="#00d2ff" opacity="0.6"/>
    <!-- LLM half -->
    <rect x="700" y="200" width="160" height="100" rx="10" fill="none" stroke="#ffd93d" stroke-width="2" opacity="0.5"/>
    <text x="780" y="255" text-anchor="middle" font-family="monospace" font-size="14" fill="#ffd93d" opacity="0.7">LLM</text>
    <rect x="720" y="360" width="120" height="60" rx="8" fill="none" stroke="#6bcf7f" stroke-width="2" opacity="0.4"/>
    <text x="780" y="395" text-anchor="middle" font-family="monospace" font-size="10" fill="#6bcf7f" opacity="0.6">RAG</text>
  </g>
  <g stroke="#00d2ff" stroke-width="1.5" opacity="0.25" stroke-dasharray="6,4">
    <line x1="500" y1="280" x2="700" y2="250"/>
  </g>
  <text x="600" y="140" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="700" fill="#e6edf3" letter-spacing="1">Guardrails for Autonomous</text>
  <text x="600" y="182" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="700" fill="#e6edf3" letter-spacing="1">AI Research Pipelines</text>
  <text x="600" y="520" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" fill="#8b949e" letter-spacing="3">AI-DRIVEN SCIENCE · AUDIT · REPRODUCIBILITY</text>

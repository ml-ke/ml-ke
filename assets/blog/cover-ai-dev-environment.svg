<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid dots -->
  <g opacity="0.08">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#58a6ff"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="150" cy="120" r="200" fill="#58a6ff" opacity="0.03"/>
  <circle cx="1050" cy="500" r="250" fill="#bc8cff" opacity="0.03"/>

  <!-- Flow lines network -->
  <g stroke="url(#accent)" stroke-width="1.5" opacity="0.4" fill="none">
    <!-- Terminal to Python -->
    <path d="M 520 280 Q 560 250 600 240"/>
    <!-- Python to Docker -->
    <path d="M 640 260 Q 670 290 660 340"/>
    <!-- Docker to Gear -->
    <path d="M 660 370 Q 640 400 600 420"/>
    <!-- Gear to VS Code -->
    <path d="M 560 420 Q 520 400 500 370"/>
    <!-- Central hub connections -->
    <path d="M 600 240 Q 600 200 600 160" stroke-dasharray="4,3"/>
    <path d="M 720 280 Q 750 300 760 340" stroke-dasharray="4,3"/>
    <path d="M 480 340 Q 460 370 480 400" stroke-dasharray="4,3"/>
  </g>

  <!-- Connecting lines between nodes -->
  <g stroke="#58a6ff" stroke-width="1" opacity="0.2" fill="none">
    <circle cx="580" cy="260" r="3" fill="#58a6ff"/>
    <circle cx="650" cy="300" r="3" fill="#58a6ff"/>
    <circle cx="630" cy="380" r="3" fill="#58a6ff"/>
    <circle cx="550" cy="390" r="3" fill="#58a6ff"/>
    <circle cx="520" cy="310" r="3" fill="#58a6ff"/>
    <circle cx="680" cy="280" r="3" fill="#58a6ff"/>
  </g>

  <!-- Icon: Terminal Window -->
  <g transform="translate(460, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="110" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <rect x="0" y="0" width="110" height="22" rx="8" fill="#21262d"/>
    <circle cx="14" cy="11" r="4" fill="#ff6b6b"/>
    <circle cx="28" cy="11" r="4" fill="#f1c40f"/>
    <circle cx="42" cy="11" r="4" fill="#3fb950"/>
    <text x="65" y="15" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">terminal</text>
    <text x="12" y="45" font-family="monospace" font-size="11" fill="#58a6ff">$</text>
    <text x="22" y="45" font-family="monospace" font-size="11" fill="#e6edf3">pip install</text>
    <text x="12" y="62" font-family="monospace" font-size="11" fill="#3fb950">✓ done</text>
  </g>

  <!-- Icon: Python Logo -->
  <g transform="translate(600, 200)" filter="url(#shadow)">
    <rect x="0" y="0" width="70" height="70" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1.5"/>
    <!-- Python blue/yellow -->
    <path d="M 35 10 c -13 0 -14 6 -14 10 v 8 h 14 v 3 h -20 c -5 0 -10 4 -10 12 v 8 c 0 7 4 10 10 10 h 6 v -4 c 0 -6 5 -11 12 -11 h 14 c 6 0 10 -5 10 -10 v -8 c 0 -5 -5 -10 -10 -10 z" fill="#306998"/>
    <path d="M 35 60 c 13 0 14 -6 14 -10 v -8 h -14 v -3 h 20 c 5 0 10 -4 10 -12 v -8 c 0 -7 -4 -10 -10 -10 h -6 v 4 c 0 6 -5 11 -12 11 h -14 c -6 0 -10 5 -10 10 v 8 c 0 5 5 10 10 10 z" fill="#ffd43b"/>
    <circle cx="28" cy="22" r="2.5" fill="#fff"/>
    <circle cx="42" cy="48" r="2.5" fill="#fff"/>
  </g>

  <!-- Icon: Docker Whale -->
  <g transform="translate(640, 300)" filter="url(#shadow)">
    <rect x="0" y="0" width="75" height="65" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1.5"/>
    <!-- Docker whale simplified -->
    <path d="M 15 40 h 8 v -8 h -8 z M 27 40 h 8 v -8 h -8 z M 39 40 h 8 v -8 h -8 z M 27 28 h 8 v -8 h -8 z M 39 28 h 8 v -8 h -8 z M 51 40 h 8 v -8 h -8 z" fill="#099cec"/>
    <path d="M 10 45 c 0 -5 3 -8 8 -8 h 44 c 6 0 8 4 8 8 v 3 c 0 3 -2 5 -5 5 h -50 c -3 0 -5 -2 -5 -5 v -3 z" fill="#099cec"/>
    <path d="M 56 35 h 5 c 3 0 5 -2 5 -5 v -2 c 0 -3 -2 -5 -5 -5 h -5 z" fill="#099cec" opacity="0.7"/>
  </g>

  <!-- Icon: Gear / Settings -->
  <g transform="translate(600, 400)" filter="url(#shadow)">
    <rect x="0" y="0" width="65" height="65" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1.5"/>
    <!-- Gear icon -->
    <g transform="translate(32, 32)">
      <circle r="18" fill="none" stroke="#8b949e" stroke-width="3"/>
      <circle r="7" fill="#8b949e"/>
      <g stroke="#8b949e" stroke-width="4" stroke-linecap="round">
        <line x1="0" y1="-22" x2="0" y2="-18"/>
        <line x1="16" y1="-16" x2="13.5" y2="-12.5"/>
        <line x1="22" y1="0" x2="18" y2="0"/>
        <line x1="16" y1="16" x2="13.5" y2="12.5"/>
        <line x1="0" y1="22" x2="0" y2="18"/>
        <line x1="-16" y1="16" x2="-13.5" y2="12.5"/>
        <line x1="-22" y1="0" x2="-18" y2="0"/>
        <line x1="-16" y1="-16" x2="-13.5" y2="-12.5"/>
      </g>
    </g>
  </g>

  <!-- Icon: VS Code -->
  <g transform="translate(500, 350)" filter="url(#shadow)">
    <rect x="0" y="0" width="65" height="65" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1.5"/>
    <!-- VS Code logo -->
    <path d="M 22 15 l -12 8 c -3 2 -3 6 0 8 l 4 3 l 0 0 v 0 l 0 0 l 8 6 c 2 2 6 2 8 0 l 24 -20 c 2 -2 2 -6 0 -8 l -4 -3 c -2 -2 -6 -2 -8 0 z" fill="#007acc"/>
    <path d="M 22 15 l -12 8 c -3 2 -3 6 0 8 l 16 12 c 2 2 6 2 8 0 l 24 -20 c 2 -2 2 -6 0 -8 l -4 -3 c -2 -2 -6 -2 -8 0 z" fill="#007acc" opacity="0.8"/>
    <path d="M 22 50 l -12 -8 c -3 -2 -3 -6 0 -8" fill="none" stroke="#0066b8" stroke-width="1.5"/>
  </g>

  <!-- Data flow particles -->
  <g fill="#3fb950" opacity="0.6">
    <circle cx="560" cy="270" r="2">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="630" cy="290" r="2">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="610" cy="360" r="2">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main Title -->
  <text x="600" y="160" font-family="'SF Mono', 'Consolas', 'Fira Code', monospace" font-size="22" fill="url(#accent)" text-anchor="middle" filter="url(#glow)" font-weight="bold">
    SETTING UP YOUR
  </text>
  <text x="600" y="195" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" fill="#e6edf3" text-anchor="middle" font-weight="bold" letter-spacing="1">
    AI Development Environment
  </text>
  <text x="600" y="225" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="3">
    TOOLS · APIs · BEST PRACTICES
  </text>

  <!-- Divider line under title -->
  <line x1="350" y1="233" x2="850" y2="233" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>

  <!-- Tool labels below icons -->
  <text x="515" y="335" font-family="monospace" font-size="10" fill="#58a6ff" text-anchor="middle">Terminal</text>
  <text x="635" y="285" font-family="monospace" font-size="10" fill="#ffd43b" text-anchor="middle">Python 3.12</text>
  <text x="678" y="380" font-family="monospace" font-size="10" fill="#099cec" text-anchor="middle">Docker</text>
  <text x="633" y="480" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Config</text>
  <text x="533" y="430" font-family="monospace" font-size="10" fill="#007acc" text-anchor="middle">VS Code</text>

  <!-- Bottom tagline -->
  <text x="1170" y="610" font-family="monospace" font-size="11" fill="#30363d" text-anchor="end">ml-ke.github.io</text>

  <!-- Bottom decorative line -->
  <line x1="0" y1="620" x2="1200" y2="620" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
</svg>

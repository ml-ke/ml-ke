<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <linearGradient id="cyan-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0.4"/>
    </linearGradient>

    <linearGradient id="green-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6bcf7f" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6bcf7f" stop-opacity="0.4"/>
    </linearGradient>

    <linearGradient id="purple-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrow-line" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8eaed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Floating particles (ambient dots) -->
  <circle cx="120" cy="90" r="2" fill="#00d2ff" opacity="0.3"/>
  <circle cx="980" cy="120" r="1.5" fill="#6bcf7f" opacity="0.3"/>
  <circle cx="600" cy="60" r="1.5" fill="#a78bfa" opacity="0.25"/>
  <circle cx="300" cy="550" r="1.8" fill="#00d2ff" opacity="0.2"/>
  <circle cx="850" cy="580" r="1.3" fill="#a78bfa" opacity="0.25"/>
  <circle cx="1100" cy="300" r="1" fill="#6bcf7f" opacity="0.2"/>

  <!-- ============ PILLAR 1: Building AI Agents (Cyan) ============ -->
  <!-- Rectangular pillar body -->
  <rect x="115" y="220" width="200" height="260" rx="8" fill="url(#cyan-grad)" stroke="#00d2ff" stroke-width="2.5" filter="url(#glow-cyan)"/>
  <!-- Top accent bar -->
  <rect x="115" y="220" width="200" height="6" rx="3" fill="#00d2ff"/>
  <!-- Pillar label inside -->
  <text x="215" y="320" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Building AI</text>
  <text x="215" y="345" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Agents</text>
  <!-- Icon: robot/agent head -->
  <g transform="translate(195,255)" fill="none" stroke="#00d2ff" stroke-width="2" opacity="0.7">
    <rect x="0" y="0" width="40" height="30" rx="6"/>
    <circle cx="20" cy="15" r="5"/>
    <line x1="10" y1="35" x2="10" y2="42"/>
    <line x1="30" y1="35" x2="30" y2="42"/>
  </g>
  <!-- Pillar detail: network nodes -->
  <circle cx="215" cy="400" r="4" fill="#00d2ff" opacity="0.5"/>
  <circle cx="215" cy="420" r="4" fill="#00d2ff" opacity="0.5"/>
  <circle cx="215" cy="440" r="4" fill="#00d2ff" opacity="0.5"/>

  <!-- ============ PILLAR 2: African AI (Green) ============ -->
  <rect x="500" y="180" width="200" height="300" rx="8" fill="url(#green-grad)" stroke="#6bcf7f" stroke-width="2.5" filter="url(#glow-green)"/>
  <rect x="500" y="180" width="200" height="6" rx="3" fill="#6bcf7f"/>
  <text x="600" y="290" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" text-anchor="middle">African AI</text>
  <text x="600" y="315" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Ecosystem</text>
  <!-- Icon: map pin / globe -->
  <g transform="translate(583,215)" fill="none" stroke="#6bcf7f" stroke-width="2" opacity="0.7">
    <circle cx="17" cy="10" r="10"/>
    <path d="M 17 20 L 17 38"/>
    <path d="M 7 30 L 27 30"/>
    <line x1="10" y1="10" x2="24" y2="10" stroke="#6bcf7f" stroke-width="1" opacity="0.4"/>
    <line x1="10" y1="15" x2="24" y2="15" stroke="#6bcf7f" stroke-width="1" opacity="0.4"/>
  </g>
  <circle cx="600" cy="370" r="4" fill="#6bcf7f" opacity="0.5"/>
  <circle cx="600" cy="390" r="4" fill="#6bcf7f" opacity="0.5"/>
  <circle cx="600" cy="410" r="4" fill="#6bcf7f" opacity="0.5"/>
  <circle cx="600" cy="430" r="4" fill="#6bcf7f" opacity="0.5"/>
  <circle cx="600" cy="450" r="4" fill="#6bcf7f" opacity="0.5"/>

  <!-- ============ PILLAR 3: AI Infrastructure (Purple) ============ -->
  <rect x="885" y="200" width="200" height="280" rx="8" fill="url(#purple-grad)" stroke="#a78bfa" stroke-width="2.5" filter="url(#glow-purple)"/>
  <rect x="885" y="200" width="200" height="6" rx="3" fill="#a78bfa"/>
  <text x="985" y="305" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" text-anchor="middle">AI</text>
  <text x="985" y="330" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Infrastructure</text>
  <!-- Icon: server / cloud -->
  <g transform="translate(968,230)" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.7">
    <rect x="0" y="8" width="34" height="22" rx="4"/>
    <line x1="5" y1="15" x2="29" y2="15"/>
    <line x1="5" y1="22" x2="29" y2="22"/>
    <circle cx="10" cy="15" r="2" fill="#a78bfa" opacity="0.5"/>
    <circle cx="10" cy="22" r="2" fill="#a78bfa" opacity="0.5"/>
  </g>
  <circle cx="985" cy="390" r="4" fill="#a78bfa" opacity="0.5"/>
  <circle cx="985" cy="410" r="4" fill="#a78bfa" opacity="0.5"/>
  <circle cx="985" cy="430" r="4" fill="#a78bfa" opacity="0.5"/>
  <circle cx="985" cy="450" r="4" fill="#a78bfa" opacity="0.5"/>

  <!-- ============ BRIDGE / CONNECTION LINES ============ -->
  <!-- Pillar 1 → Pillar 2 -->
  <path d="M 315,340 C 380,310 420,280 500,280" fill="none" stroke="#e8eaed" stroke-width="2" stroke-dasharray="8,4" opacity="0.5" marker-end="url(#arrow-line)"/>
  <!-- Pillar 2 → Pillar 3 -->
  <path d="M 700,280 C 780,280 820,310 885,340" fill="none" stroke="#e8eaed" stroke-width="2" stroke-dasharray="8,4" opacity="0.5" marker-end="url(#arrow-line)"/>

  <!-- Flow labels on bridges -->
  <text x="410" y="270" fill="#9aa0a6" font-family="monospace" font-size="11" text-anchor="middle" opacity="0.7">build → deploy</text>
  <text x="790" y="270" fill="#9aa0a6" font-family="monospace" font-size="11" text-anchor="middle" opacity="0.7">deploy → scale</text>

  <!-- ============ TITLE ============ -->
  <text x="600" y="510" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" text-anchor="middle" letter-spacing="1">Three New Series Coming</text>
  <text x="600" y="540" fill="#9aa0a6" font-family="system-ui, -apple-system, sans-serif" font-size="15" text-anchor="middle" opacity="0.8">AI Agents · African AI · MLOps &amp; Infrastructure</text>

  <!-- Bottom left: start date -->
  <text x="30" y="600" fill="#6bcf7f" font-family="monospace" font-size="13" text-anchor="start" opacity="0.8">Starts June 15</text>

  <!-- Bottom right: domain -->
  <text x="1170" y="600" fill="#9aa0a6" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="end" opacity="0.7">ml-ke.github.io</text>
</svg>
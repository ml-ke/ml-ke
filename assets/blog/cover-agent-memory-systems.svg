<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="310" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" text-anchor="middle" dominant-baseline="middle">Memory Systems for AI Agents</text>

  <!-- Bottom tier: Disk -->
  <rect x="300" y="400" width="600" height="60" rx="6" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-width="2"/>
  <text x="600" y="435" fill="#a78bfa" font-family="monospace" font-size="16" text-anchor="middle" font-weight="600">DISK STORAGE</text>
  <text x="600" y="455" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.7">Persistent long-term memory</text>

  <!-- Middle tier: Vector DB -->
  <rect x="380" y="300" width="440" height="60" rx="6" fill="#00d2ff" fill-opacity="0.15" stroke="#00d2ff" stroke-width="2"/>
  <text x="600" y="335" fill="#00d2ff" font-family="monospace" font-size="16" text-anchor="middle" font-weight="600">VECTOR DATABASE</text>
  <text x="600" y="355" fill="#00d2ff" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.7">Semantic retrieval &amp; embeddings</text>

  <!-- Top tier: Buffer -->
  <rect x="460" y="200" width="280" height="60" rx="6" fill="#ffd93d" fill-opacity="0.15" stroke="#ffd93d" stroke-width="2"/>
  <text x="600" y="235" fill="#ffd93d" font-family="monospace" font-size="16" text-anchor="middle" font-weight="600">WORKING BUFFER</text>
  <text x="600" y="255" fill="#ffd93d" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.7">Short-term context window</text>

  <!-- Connection arrows -->
  <g fill="none" stroke="#9aa0a6" stroke-width="1.5" opacity="0.4">
    <line x1="600" y1="260" x2="600" y2="300"/>
    <line x1="600" y1="360" x2="600" y2="400"/>
    <polygon points="595,265 600,255 605,265" fill="#9aa0a6"/>
    <polygon points="595,365 600,355 605,365" fill="#9aa0a6"/>
  </g>

  <!-- Pyramid outline -->
  <polygon points="300,460 900,460 780,160 420,160" fill="none" stroke="#9aa0a6" stroke-opacity="0.08" stroke-width="1"/>

  <text x="1170" y="600" fill="#9aa0a6" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="end" opacity="0.7">ml-ke.github.io</text>
</svg>
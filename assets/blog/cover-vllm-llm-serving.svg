<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <marker id="arrow-vllm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d2ff"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="310" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" text-anchor="middle" dominant-baseline="middle">vLLM &amp; LLM Serving</text>

  <!-- vLLM Engine -->
  <g transform="translate(600, 280)">
    <rect x="-100" y="-50" width="200" height="100" rx="12" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="0" y="-10" fill="#a78bfa" font-family="monospace" font-size="20" font-weight="700" text-anchor="middle">vLLM</text>
    <text x="0" y="15" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.7">Inference Engine</text>
    <!-- Engine status light -->
    <circle cx="0" cy="35" r="4" fill="#6bcf7f" opacity="0.6"/>
  </g>

  <!-- Multiple parallel request arrows entering from left -->
  <g fill="none" stroke="#ffd93d" stroke-width="2" opacity="0.5">
    <path d="M 150 230 L 480 240" marker-end="url(#arrow-vllm)"/>
    <path d="M 150 270 L 480 270" marker-end="url(#arrow-vllm)"/>
    <path d="M 150 310 L 480 300" marker-end="url(#arrow-vllm)"/>
    <path d="M 150 350 L 480 330" marker-end="url(#arrow-vllm)"/>
  </g>
  <g fill="#ffd93d" font-family="monospace" font-size="10" opacity="0.4">
    <text x="300" y="235" text-anchor="middle">POST /generate</text>
    <text x="300" y="275" text-anchor="middle">POST /generate</text>
    <text x="300" y="315" text-anchor="middle">POST /generate</text>
    <text x="300" y="355" text-anchor="middle">POST /generate</text>
  </g>

  <!-- Responses streaming out to the right -->
  <g fill="none" stroke="#6bcf7f" stroke-width="2" opacity="0.5">
    <path d="M 700 240 L 1020 230"/>
    <path d="M 700 270 L 1020 270"/>
    <path d="M 700 300 L 1020 310"/>
    <path d="M 700 330 L 1020 350"/>
  </g>
  <g fill="#6bcf7f" font-family="monospace" font-size="10" opacity="0.4">
    <text x="860" y="235" text-anchor="middle">stream chunks...</text>
    <text x="860" y="275" text-anchor="middle">stream chunks...</text>
    <text x="860" y="315" text-anchor="middle">stream chunks...</text>
    <text x="860" y="355" text-anchor="middle">stream chunks...</text>
  </g>

  <!-- PagedAttention / KV cache indicator -->
  <g transform="translate(600, 420)">
    <rect x="-100" y="-15" width="200" height="30" rx="6" fill="none" stroke="#00d2ff" stroke-width="1" opacity="0.3"/>
    <text x="0" y="3" fill="#00d2ff" font-family="monospace" font-size="9" text-anchor="middle" opacity="0.5">PagedAttention · KV Cache · Continuous Batching</text>
  </g>

  <text x="1170" y="600" fill="#9aa0a6" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="end" opacity="0.7">ml-ke.github.io</text>
</svg>
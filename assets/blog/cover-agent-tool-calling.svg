<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <marker id="arrow-arm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6bcf7f"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="310" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" text-anchor="middle" dominant-baseline="middle">Tool Use and Function Calling</text>

  <!-- Robot arm base -->
  <rect x="100" y="300" width="80" height="40" rx="8" fill="#00d2ff" fill-opacity="0.15" stroke="#00d2ff" stroke-width="2"/>
  <circle cx="140" cy="280" r="20" fill="#00d2ff" fill-opacity="0.2" stroke="#00d2ff" stroke-width="2"/>
  <circle cx="140" cy="280" r="8" fill="#00d2ff" fill-opacity="0.3"/>

  <!-- Arm segments -->
  <line x1="160" y1="280" x2="280" y2="240" stroke="#00d2ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="280" y1="240" x2="390" y2="280" stroke="#00d2ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="390" y1="280" x2="470" y2="255" stroke="#00d2ff" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-arm)"/>

  <!-- Joint circles -->
  <circle cx="280" cy="240" r="8" fill="#ffd93d" opacity="0.6"/>
  <circle cx="390" cy="280" r="6" fill="#ffd93d" opacity="0.6"/>

  <!-- Gripper -->
  <path d="M 470 245 L 490 235 L 490 255 Z" fill="none" stroke="#00d2ff" stroke-width="2"/>
  <path d="M 470 265 L 490 275 L 490 255 Z" fill="none" stroke="#00d2ff" stroke-width="2"/>

  <!-- Tools -->
  <!-- Wrench -->
  <g transform="translate(620, 180)">
    <rect x="-5" y="-20" width="10" height="25" rx="3" fill="#ffd93d" fill-opacity="0.3" stroke="#ffd93d" stroke-width="2"/>
    <path d="M -10 -20 Q 0 -28 10 -20 L 8 -15 L -8 -15 Z" fill="none" stroke="#ffd93d" stroke-width="2"/>
  </g>
  <text x="620" y="220" fill="#ffd93d" font-family="monospace" font-size="11" text-anchor="middle">WRENCH</text>

  <!-- Magnifying glass -->
  <g transform="translate(740, 200)">
    <circle cx="0" cy="-10" r="14" fill="none" stroke="#6bcf7f" stroke-width="2.5"/>
    <line x1="10" y1="0" x2="20" y2="10" stroke="#6bcf7f" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="740" y="240" fill="#6bcf7f" font-family="monospace" font-size="11" text-anchor="middle">SEARCH</text>

  <!-- Calculator -->
  <g transform="translate(860, 180)">
    <rect x="-16" y="-22" width="32" height="40" rx="4" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <text x="0" y="-8" fill="#ff6b6b" font-family="monospace" font-size="8" text-anchor="middle">7 8 9</text>
    <text x="0" y="2" fill="#ff6b6b" font-family="monospace" font-size="8" text-anchor="middle">4 5 6</text>
    <text x="0" y="12" fill="#ff6b6b" font-family="monospace" font-size="8" text-anchor="middle">1 2 3</text>
  </g>
  <text x="860" y="230" fill="#ff6b6b" font-family="monospace" font-size="11" text-anchor="middle">CALC</text>

  <!-- Tool Description -->
  <text x="600" y="400" fill="#9aa0a6" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle" opacity="0.6">Agents call external tools via function interfaces</text>

  <text x="1170" y="600" fill="#9aa0a6" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="end" opacity="0.7">ml-ke.github.io</text>
</svg>
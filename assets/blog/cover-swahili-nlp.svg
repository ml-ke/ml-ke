<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <marker id="arrow-sw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d2ff"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="310" fill="#e8eaed" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" text-anchor="middle" dominant-baseline="middle">Swahili NLP</text>

  <!-- Left speech bubble - Swahili -->
  <g transform="translate(380, 250)">
    <path d="M -90 -50 Q -90 -80 -60 -80 L 60 -80 Q 90 -80 90 -50 L 90 10 Q 90 40 60 40 L 20 40 L 0 70 L -10 40 L -60 40 Q -90 40 -90 10 Z"
          fill="none" stroke="#6bcf7f" stroke-width="2" opacity="0.7"/>
    <text x="0" y="-45" fill="#6bcf7f" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle" font-weight="600">"Habari za asubuhi"</text>
    <text x="0" y="-25" fill="#6bcf7f" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.6">Good morning</text>
  </g>

  <!-- Right speech bubble - English/Swahili -->
  <g transform="translate(820, 250)">
    <path d="M -90 -50 Q -90 -80 -60 -80 L 60 -80 Q 90 -80 90 -50 L 90 10 Q 90 40 60 40 L 20 40 L 0 70 L -10 40 L -60 40 Q -90 40 -90 10 Z"
          fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.7"/>
    <text x="0" y="-45" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle" font-weight="600">"Asante sana!"</text>
    <text x="0" y="-25" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.6">Thank you very much</text>
  </g>

  <!-- Translation arrows between bubbles -->
  <g fill="none" stroke="#00d2ff" stroke-width="2" opacity="0.5">
    <path d="M 480 250 Q 540 220 600 220 Q 660 220 710 250" marker-end="url(#arrow-sw)"/>
    <path d="M 710 290 Q 660 320 600 320 Q 540 320 480 290" marker-end="url(#arrow-sw)"/>
  </g>

  <!-- NLP tags -->
  <g fill="#00d2ff" font-family="monospace" font-size="10" opacity="0.5">
    <text x="540" y="215">tokenization</text>
    <text x="530" y="340">translation</text>
  </g>

  <text x="600" y="490" fill="#9aa0a6" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" opacity="0.5">Natural language processing for East Africa's lingua franca</text>

  <text x="1170" y="600" fill="#9aa0a6" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="end" opacity="0.7">ml-ke.github.io</text>
</svg>